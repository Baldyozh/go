kafka:
  brokers:
    - "localhost:9092"
  topic: "logs"
  group_id: "log-processor"
crypto:
  fields_to_encrypt:
    - "passport"
    - "snils"
  encryption_type: "local"  # "vault" or "local"
  local_encryption:
    key_rotation_interval: "24h"
    algorithm: "aes-gcm"
vault:
  address: "http://localhost:8200"
  token: "my-root-token"
  transit_path: "transit"
  key_name: "kafka-encryption"
clickhouse:
  address: "localhost"
  port: 9000
  login: "default"
  password: "default"
worker_pool:
  worker_count: 6
  channel_buffer_size: 300
batch:
  size: 5000
  flush_interval: "5s"
postgres:
  host: "localhost"
  port: 5432
  user: "pguser"
  password: "pgpassword"
  database: "log-processor"
api:
  port: "8080"
  jwt_secret: "your-secret-key-change-in-production"
  jwt_expiry: "24h"
  jwt_issuer: "log-processor-api"
